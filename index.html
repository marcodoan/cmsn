<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Sinh Nhật! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="card-container">
        <div id="card-closed" class="screen">
            
            <div id="candle-flame-container">
                <div id="flame" class="flame"></div>
                <div id="smoke" class="smoke hidden"></div>
            </div>

            <p id="instruction">🤟 Chạm vào ngọn nến để thổi nhé!🤟 </p>
        </div>

        <div id="card-open" class="screen hidden">
            <div id="open-content">
                <h1>CHÚC MỪNG SINH NHẬT! 🥳</h1>
                <p>Tuổi mới thật nhiều niềm vui, luôn xinh đẹp và rực rỡ như những bông hoa nhé!</p>
                
                <div class="photo-gallery">
                    <div class="photo-placeholder">Ảnh 1</div>
                    <div class="photo-placeholder">Ảnh 2</div>
                </div>
                <button id="restart-btn">Xem lại từ đầu</button>
            </div>
        </div>

        <canvas id="confetti-canvas"></canvas>
        <audio id="birthday-song" src="assets/audio/happy_birthday.mp3" preload="auto"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
